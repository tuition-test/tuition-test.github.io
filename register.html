<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduPortal — Register</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0f1e;
    --surface: #111827;
    --surface2: #1a2235;
    --accent: #4f9ef8;
    --accent2: #7c3aed;
    --green: #10b981;
    --text: #f0f4ff;
    --muted: #8899bb;
    --border: rgba(79,158,248,0.15);
    --glow: rgba(79,158,248,0.25);
  }

  html, body {
    min-height: 100%;
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 80% 10%, rgba(124,58,237,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 20% 90%, rgba(79,158,248,0.10) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(79,158,248,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,158,248,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 30px 20px;
    position: relative;
    z-index: 1;
  }

  .card {
    width: 100%;
    max-width: 480px;
    background: rgba(17,24,39,0.85);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 36px;
    backdrop-filter: blur(20px);
    box-shadow: 0 0 60px rgba(124,58,237,0.07), 0 25px 50px rgba(0,0,0,0.4);
    animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    box-shadow: 0 0 20px rgba(124,58,237,0.35);
  }

  .logo-text {
    font-size: 20px;
    font-weight: 700;
    background: linear-gradient(90deg, #a78bfa, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }

  h2 {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 28px;
  }

  /* Progress steps */
  .steps {
    display: flex;
    gap: 6px;
    margin-bottom: 26px;
  }

  .step {
    flex: 1;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    transition: background 0.4s ease;
  }

  .step.active { background: var(--accent); }
  .step.done { background: var(--green); }

  .field {
    margin-bottom: 14px;
    position: relative;
  }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 7px;
  }

  .field input, .field select {
    width: 100%;
    padding: 12px 16px 12px 44px;
    background: var(--surface2);
    border: 1px solid rgba(79,158,248,0.12);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    outline: none;
    transition: all 0.25s ease;
    appearance: none;
  }

  .field input:focus, .field select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79,158,248,0.12);
    background: rgba(26,34,53,0.9);
  }

  .field input::placeholder { color: #445566; }
  .field select option { background: #1a2235; }

  .field-icon {
    position: absolute;
    left: 14px;
    bottom: 13px;
    width: 18px;
    height: 18px;
    color: var(--muted);
    pointer-events: none;
  }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'Sora', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-top: 10px;
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(124,58,237,0.35); }
  .btn:hover::before { opacity: 1; }
  .btn:active { transform: translateY(0); }

  .btn.loading { pointer-events: none; opacity: 0.8; }
  .btn.loading::after {
    content: '';
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-left: 8px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .msg {
    margin-top: 14px;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    display: none;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; } }

  .msg.error  { background: rgba(239,68,68,0.12);  border: 1px solid rgba(239,68,68,0.25);  color: #f87171; display: block; }
  .msg.success{ background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.25); color: #34d399; display: block; }

  .link-row {
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
    color: var(--muted);
  }

  .link-row a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
  }

  .link-row a:hover { color: #93c5fd; }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
    color: var(--muted);
    font-size: 12px;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--accent);
    margin-bottom: 14px;
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  @media (max-width: 480px) {
    .card { padding: 28px 18px; }
    h2 { font-size: 22px; }
    .row2 { grid-template-columns: 1fr; gap: 0; }
  }
</style>
</head>
<body>

<div class="page">
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🎓</div>
      <span class="logo-text">EduPortal</span>
    </div>

    <h2>Create account</h2>
    <p class="subtitle">Join your school's student portal</p>

    <!-- Progress bar -->
    <div class="steps">
      <div class="step active" id="s1"></div>
      <div class="step" id="s2"></div>
      <div class="step" id="s3"></div>
    </div>

    <div class="section-label">Personal Info</div>

    <div class="field">
      <label>Full Name</label>
      <svg class="field-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      <input id="name" placeholder="Your full name">
    </div>

    <div class="row2">
      <div class="field">
        <label>Class</label>
        <svg class="field-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
        <input id="class" placeholder="e.g. 11">
      </div>
      <div class="field">
        <label>Stream</label>
        <svg class="field-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
        <input id="stream" placeholder="e.g. Science">
      </div>
    </div>

    <div class="section-label">Contact</div>

    <div class="field">
      <label>Mobile Number</label>
      <svg class="field-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
      <input id="mobile" placeholder="10-digit number" type="tel" maxlength="10">
    </div>

    <div class="field">
      <label>Email Address</label>
      <svg class="field-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
      <input id="email" placeholder="your@email.com" type="email">
    </div>

    <div class="section-label">Account</div>

    <div class="field">
      <label>User ID</label>
      <svg class="field-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2"/></svg>
      <input id="userid" placeholder="Choose a unique User ID">
    </div>

    <div class="field">
      <label>Password</label>
      <svg class="field-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
      <input id="password" type="password" placeholder="Create a strong password">
    </div>

    <button class="btn" id="regBtn" onclick="register()">Create Account</button>

    <div id="reg_msg" class="msg"></div>

    <div class="divider">or</div>

    <div class="link-row">
      Already registered? <a href="index.html">Sign in →</a>
    </div>
  </div>
</div>

<script>
  const API = "https://script.google.com/macros/s/AKfycbwOD6YjEr3MaJITkFmex5FXl2VVzcTyXFfa91Ob5vwq5jCO-5ZS64GoRktR6VfUBfT7/exec";

  // Animate progress as user fills in fields
  const fields = ['name','class','stream','mobile','email','userid','password'];
  fields.forEach(id => {
    document.getElementById(id)?.addEventListener('input', updateProgress);
  });

  function updateProgress() {
    const filled = fields.filter(id => document.getElementById(id)?.value?.trim()).length;
    const pct = filled / fields.length;
    document.getElementById('s1').className = 'step ' + (pct > 0 ? (pct >= 0.35 ? 'done' : 'active') : '');
    document.getElementById('s2').className = 'step ' + (pct >= 0.35 ? (pct >= 0.7 ? 'done' : 'active') : '');
    document.getElementById('s3').className = 'step ' + (pct >= 0.7 ? (pct >= 1 ? 'done' : 'active') : '');
  }

  async function register() {
    const msg = document.getElementById('reg_msg');
    const btn = document.getElementById('regBtn');

    msg.className = 'msg';
    msg.textContent = '';

    const vals = {
      name: document.getElementById('name').value.trim(),
      class: document.getElementById('class').value.trim(),
      stream: document.getElementById('stream').value.trim(),
      mobile: document.getElementById('mobile').value.trim(),
      email: document.getElementById('email').value.trim(),
      userid: document.getElementById('userid').value.trim(),
      password: document.getElementById('password').value
    };

    if (Object.values(vals).some(v => !v)) {
      msg.textContent = 'Please fill in all fields.';
      msg.className = 'msg error';
      return;
    }

    btn.classList.add('loading');
    btn.textContent = 'Creating account';

    try {
      const res = await fetch(API, {
        method: 'POST',
        body: JSON.stringify({ action: 'registerStudent', ...vals })
      });
      const result = await res.json();

      if (result.status === 'success' || result.message?.toLowerCase().includes('success')) {
        msg.textContent = '✓ Account created! Redirecting to login...';
        msg.className = 'msg success';
        setTimeout(() => window.location.href = 'index.html', 1500);
      } else {
        msg.textContent = result.message || 'Registration failed. Try again.';
        msg.className = 'msg error';
        btn.classList.remove('loading');
        btn.textContent = 'Create Account';
      }
    } catch (e) {
      msg.textContent = 'Network error. Please try again.';
      msg.className = 'msg error';
      btn.classList.remove('loading');
      btn.textContent = 'Create Account';
    }
  }
</script>
</body>
</html>
