<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="base-path" content="../../" />
<title>Fee Status - Student</title>
<link rel="stylesheet" href="../../shared/css/styles.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="page">
  <h2>💰 Fee Status</h2>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Monthly Fee</div>
      <div class="stat-value" id="stat-monthly">₹0</div>
    </div>
    <div class="stat-card warning">
      <div class="stat-label">Total Outstanding</div>
      <div class="stat-value" id="stat-due">₹0</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Payment History</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Month</th><th>Amount Due</th><th>Amount Paid</th><th>Status</th><th>Paid On</th></tr>
        </thead>
        <tbody id="fee-tbody">
          <tr><td colspan="5" class="text-center"><div class="spinner"></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="../../shared/js/supabase-client.js"></script>
<script src="../../shared/js/auth.js"></script>
<script src="../../shared/js/utils.js"></script>
<script>
(async () => {
  const profile = await Auth.guard('tuition_student');
  if (!profile) return;

  document.getElementById('stat-monthly').textContent = Utils.formatCurrency(profile.monthly_fee || 0);

  const { data, error } = await sb
    .from('fee_records')
    .select('*')
    .eq('student_id', profile.id)
    .order('month', { ascending: false });

  const tbody = document.getElementById('fee-tbody');

  if (error) {
    tbody.innerHTML = `<tr><td colspan="5" class="text-center">Error loading fees</td></tr>`;
    return;
  }

  if (!data || !data.length) {
    tbody.innerHTML = `<tr><td colspan="5" class="text-center">No fee records yet</td></tr>`;
    document.getElementById('stat-due').textContent = '₹0';
    return;
  }

  let totalDue = 0;
  tbody.innerHTML = data.map(f => {
    const due = Math.max(0, (f.amount_due || 0) - (f.amount_paid || 0));
    totalDue += due;
    return `
    <tr>
      <td>${f.month}</td>
      <td>${Utils.formatCurrency(f.amount_due)}</td>
      <td>${Utils.formatCurrency(f.amount_paid)}</td>
      <td><span class="badge badge-${f.status}">${f.status}</span></td>
      <td>${Utils.formatDate(f.paid_on)}</td>
    </tr>
  `;
  }).join('');

  document.getElementById('stat-due').textContent = Utils.formatCurrency(totalDue);
})();
</script>
</body>
</html>
