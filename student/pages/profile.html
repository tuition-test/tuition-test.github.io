<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="base-path" content="../../" />
<title>My Profile - Student</title>
<link rel="stylesheet" href="../../shared/css/styles.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="page">
  <h2>👤 My Profile</h2>

  <div id="first-login-banner" class="card hidden" style="background:#fef3c7;box-shadow:none;">
    <strong>⚠️ Please complete your profile</strong>
    <p class="text-sm mt-8">Welcome! Please update your mobile number and (if needed) set a new password before continuing.</p>
  </div>

  <div class="card">
    <div class="card-title">Profile Information</div>
    <form id="profile-form">
      <div class="text-center mb-0">
        <img id="profile-pic-preview" src="" class="hidden" style="width:90px;height:90px;border-radius:50%;object-fit:cover;margin:0 auto 8px;" />
        <div id="profile-pic-placeholder" class="avatar" style="width:90px;height:90px;font-size:36px;margin:0 auto 8px;background:var(--primary-light);color:var(--primary);">?</div>
        <input type="file" id="profile-pic-input" accept="image/*" style="max-width:240px;margin:0 auto;" />
      </div>

      <div class="form-group mt-16">
        <label>Full Name</label>
        <input type="text" id="p-name" required />
      </div>
      <div class="form-group">
        <label>Mobile Number *</label>
        <input type="tel" id="p-mobile" required pattern="[0-9]{10}" />
      </div>
      <div class="form-group">
        <label>Email (optional)</label>
        <input type="email" id="p-email" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Board</label>
          <input type="text" id="p-board" readonly />
        </div>
        <div class="form-group">
          <label>Class</label>
          <input type="text" id="p-class" readonly />
        </div>
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="p-username" readonly />
      </div>
      <button type="submit" class="btn btn-block">Save Profile</button>
    </form>
  </div>

  <div class="card">
    <div class="card-title">Change Password</div>
    <form id="pwd-form">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="new-password" minlength="6" required />
      </div>
      <button type="submit" class="btn btn-outline">Change Password</button>
    </form>
  </div>

  <div class="card">
    <div class="card-title">📚 My Subjects</div>
    <div id="my-subjects"><div class="spinner"></div></div>
  </div>
</div>

<script src="../../shared/js/supabase-client.js"></script>
<script src="../../shared/js/auth.js"></script>
<script src="../../shared/js/utils.js"></script>
<script>
let currentProfile = null;

(async () => {
  currentProfile = await Auth.guard('tuition_student');
  if (!currentProfile) return;

  if (Utils.getQueryParam('firstlogin')) {
    document.getElementById('first-login-banner').classList.remove('hidden');
  }

  document.getElementById('p-name').value = currentProfile.name || '';
  document.getElementById('p-mobile').value = currentProfile.mobile || '';
  document.getElementById('p-email').value = currentProfile.email || '';
  document.getElementById('p-board').value = currentProfile.board || '';
  document.getElementById('p-class').value = currentProfile.class || '';
  document.getElementById('p-username').value = '@' + currentProfile.username;

  if (currentProfile.profile_picture) {
    document.getElementById('profile-pic-preview').src = currentProfile.profile_picture;
    document.getElementById('profile-pic-preview').classList.remove('hidden');
    document.getElementById('profile-pic-placeholder').classList.add('hidden');
  } else {
    document.getElementById('profile-pic-placeholder').textContent = (currentProfile.name || '?').charAt(0).toUpperCase();
  }

  // Load subjects
  const { data: subjects } = await sb
    .from('student_subjects')
    .select('subjects(name, board, class)')
    .eq('student_id', currentProfile.id);

  const container = document.getElementById('my-subjects');
  if (subjects && subjects.length) {
    container.innerHTML = `<div class="flex flex-wrap gap-8">${subjects.map(s => `<span class="chip">${Utils.escapeHtml(s.subjects?.name || '-')}</span>`).join('')}</div>`;
  } else {
    container.innerHTML = `<div class="empty-state"><div class="icon">📚</div>No subjects assigned yet. Contact admin.</div>`;
  }
})();

document.getElementById('profile-form').addEventListener('submit', async (e) => {
  e.preventDefault();

  const name = document.getElementById('p-name').value.trim();
  const mobile = document.getElementById('p-mobile').value.trim();
  const email = document.getElementById('p-email').value.trim();
  const picFile = document.getElementById('profile-pic-input').files[0];

  let profilePicture = currentProfile.profile_picture;

  if (picFile) {
    const fileName = `${currentProfile.id}_${Date.now()}_${picFile.name}`;
    const { error: uploadErr } = await sb.storage.from('profile-pictures').upload(fileName, picFile, { upsert: true });
    if (uploadErr) {
      Utils.toast('Image upload failed: ' + uploadErr.message, 'error');
      return;
    }
    const { data: urlData } = sb.storage.from('profile-pictures').getPublicUrl(fileName);
    profilePicture = urlData.publicUrl;
  }

  const { error } = await sb.from('profiles').update({
    name, mobile, email: email || null, profile_picture: profilePicture
  }).eq('id', currentProfile.id);

  if (error) {
    Utils.toast('Update failed: ' + error.message, 'error');
  } else {
    Utils.toast('Profile updated', 'success');
    document.getElementById('first-login-banner').classList.add('hidden');
    currentProfile.profile_picture = profilePicture;
  }
});

document.getElementById('pwd-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const newPassword = document.getElementById('new-password').value;

  try {
    await Auth.changePassword(newPassword);
    Utils.toast('Password updated successfully', 'success');
    document.getElementById('pwd-form').reset();
    document.getElementById('first-login-banner').classList.add('hidden');
  } catch (err) {
    Utils.toast('Failed: ' + err.message, 'error');
  }
});
</script>
</body>
</html>
